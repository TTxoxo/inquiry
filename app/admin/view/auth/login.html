<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Arial, Helvetica, sans-serif; background: linear-gradient(135deg, #111827, #2563eb); }

<div class="panel">

        <input type="hidden" name="_csrf_token" value="<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>">

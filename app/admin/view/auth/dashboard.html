<div class="row">
    <div class="card stat"><h2>控制台</h2><p class="muted">本页汇总后台业务管理层真实数据库数据。</p><p>当前角色：<strong><?= htmlspecialchars((string) ($viewData['user']['role_type'] ?? ''), ENT_QUOTES, 'UTF-8') ?></strong></p></div>
    <div class="card stat"><h2>会话</h2><p class="muted">站点隔离以当前 session 的 site_id 为准。</p><p>Site ID：<strong><?= (int) ($viewData['user']['site_id'] ?? 0) ?></strong></p></div>
</div>
<div class="card" style="margin-top:24px;">
    <h2>业务概览</h2>
    <p class="muted">点击下方按钮从真实数据库刷新汇总。</p>
    <button class="btn btn-primary" type="button" onclick="loadDashboard()">刷新控制台</button>
    <pre id="dashboard-json">Loading...</pre>
</div>
<script>
async function loadDashboard() {
    const formData = new FormData();
    formData.append('_csrf_token', '<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>');
    const response = await fetch('/admin/dashboard/stats', {method: 'POST', body: formData});
    const data = await response.json();
    document.getElementById('dashboard-json').textContent = JSON.stringify(data, null, 2);
}
loadDashboard();
</script>

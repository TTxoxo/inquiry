    <div class="toolbar">
        <?php if (($viewData['list_endpoint'] ?? '') !== ''): ?><button class="btn btn-primary" type="button" onclick="loadModuleData()">刷新数据</button><?php endif; ?>
        <?php if (($viewData['export_endpoint'] ?? '') !== ''): ?><button class="btn btn-secondary" type="button" onclick="exportModuleCsv()">导出 CSV</button><?php endif; ?>
        <?php if (($viewData['action_hint'] ?? '') !== ''): ?><span class="muted"><?= htmlspecialchars((string) ($viewData['action_hint'] ?? ''), ENT_QUOTES, 'UTF-8') ?></span><?php endif; ?>
    </div>
</div>

<div class="card" style="margin-top:16px;">
    <h3>POST 动作表单</h3>
    <form id="module-form">
        <input type="hidden" name="_csrf_token" value="<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>">

            <?php foreach (($viewData['form_fields'] ?? []) as $field): ?>
                <div class="field">

                    <?php if (($field['type'] ?? 'text') === 'textarea'): ?>
                        <textarea name="<?= htmlspecialchars((string) $field['name'], ENT_QUOTES, 'UTF-8') ?>" rows="4"><?= htmlspecialchars((string) ($field['value'] ?? ''), ENT_QUOTES, 'UTF-8') ?></textarea>
                    <?php else: ?>
                        <input type="text" name="<?= htmlspecialchars((string) $field['name'], ENT_QUOTES, 'UTF-8') ?>" value="<?= htmlspecialchars((string) ($field['value'] ?? ''), ENT_QUOTES, 'UTF-8') ?>" placeholder="<?= htmlspecialchars((string) ($field['placeholder'] ?? ''), ENT_QUOTES, 'UTF-8') ?>">
                    <?php endif; ?>
                </div>
            <?php endforeach; ?>
        </div>
        <?php if (($viewData['save_endpoint'] ?? '') !== ''): ?><button class="btn btn-primary" type="button" onclick="submitModuleForm()">提交保存</button><?php endif; ?>

    <h3>立即重发</h3>
    <div class="row">
        <div class="field" style="flex:1 1 240px;">
            <label>邮件日志 ID</label>
            <input type="text" id="retry-id" placeholder="请输入 id">
        </div>
        <div style="align-self:end;">
            <button class="btn btn-secondary" type="button" onclick="retryItem()">立即重发</button>
        </div>
    </div>

<?php if (($viewData['detail_endpoint'] ?? '') !== ''): ?>
<div class="card" style="margin-top:16px;">
    <h3>详情查询</h3>
    <div class="row">
        <div class="field" style="flex:1 1 240px;">
            <label>记录 ID</label>
            <input type="text" id="detail-id" placeholder="请输入 id">
        </div>
        <div style="align-self:end;">
            <button class="btn btn-secondary" type="button" onclick="loadDetail()">读取详情</button>
        </div>
    </div>
    <pre id="detail-json">尚未加载详情。</pre>
</div>
<?php endif; ?>
<script>
const moduleConfig = <?= json_encode([
    'listEndpoint' => $viewData['list_endpoint'] ?? '',
    'saveEndpoint' => $viewData['save_endpoint'] ?? '',
    'deleteEndpoint' => $viewData['delete_endpoint'] ?? '',
    'detailEndpoint' => $viewData['detail_endpoint'] ?? '',
    'exportEndpoint' => $viewData['export_endpoint'] ?? '',
    'retryEndpoint' => $viewData['retry_endpoint'] ?? '',
], JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES) ?>;

async function postJson(url, payload) {
    const formData = new FormData();
    Object.entries(payload || {}).forEach(([key, value]) => {
        formData.append(key, typeof value === 'object' ? JSON.stringify(value) : value);
    });
    const response = await fetch(url, { method: 'POST', body: formData });
    return await response.json();
}

async function loadModuleData() {
    if (!moduleConfig.listEndpoint) return;
    const data = await postJson(moduleConfig.listEndpoint, {_csrf_token: '<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>'});
    document.getElementById('module-json').textContent = JSON.stringify(data, null, 2);
}

async function submitModuleForm() {
    if (!moduleConfig.saveEndpoint) return;
    const form = document.getElementById('module-form');
    const payload = Object.fromEntries(new FormData(form).entries());
    const data = await postJson(moduleConfig.saveEndpoint, payload);
    document.getElementById('module-json').textContent = JSON.stringify(data, null, 2);
    if (data.code === 0) { loadModuleData(); }
}

async function loadDetail() {
    if (!moduleConfig.detailEndpoint) return;
    const id = document.getElementById('detail-id').value;
    const data = await postJson(moduleConfig.detailEndpoint, {id, _csrf_token: '<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>'});
    document.getElementById('detail-json').textContent = JSON.stringify(data, null, 2);
}

async function exportModuleCsv() {
    if (!moduleConfig.exportEndpoint) return;
    const data = await postJson(moduleConfig.exportEndpoint, {_csrf_token: '<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>'});
    document.getElementById('module-json').textContent = JSON.stringify(data, null, 2);
}

async function retryItem() {
    if (!moduleConfig.retryEndpoint) return;
    const id = document.getElementById('retry-id').value;
    const data = await postJson(moduleConfig.retryEndpoint, {id, _csrf_token: '<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>'});
    document.getElementById('module-json').textContent = JSON.stringify(data, null, 2);
    if (data.code === 0) { loadModuleData(); }
}

loadModuleData();
</script>

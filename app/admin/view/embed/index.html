<div class="card">
    <h2><?= htmlspecialchars((string) ($viewData['page_title'] ?? ''), ENT_QUOTES, 'UTF-8') ?></h2>
    <p class="muted">本阶段仅补足前端嵌入层：embed.js / embed.css、inline / floating 示例、失败与 dataLayer 行为说明。</p>
    <div class="toolbar">
        <button class="btn btn-primary" type="button" onclick="loadEmbedData()">刷新嵌入代码</button>
    </div>
</div>

<div class="card" style="margin-top:16px;">
    <h3>嵌入代码列表</h3>
    <p class="muted">每条记录会展示 inline 与 floating 两种示例。实际渲染依赖 <code>/assets/embed/embed.js</code> 通过 <code>site_key</code>、<code>form_key</code>、<code>mode</code> 请求配置。</p>
    <div id="embed-list" class="grid-2"></div>
</div>

<div class="card" style="margin-top:16px;">
    <h3>数据返回</h3>
    <pre id="module-json">Loading...</pre>
</div>

<script>
const embedPageConfig = {
    listEndpoint: '/admin/embed/list',
    csrfToken: '<?= htmlspecialchars((string) ($viewData['csrf_token'] ?? ''), ENT_QUOTES, 'UTF-8') ?>'
};

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, function (char) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char];
    });
}

function buildInlineExample(item) {
    const scriptUrl = new URL(item.embed.script_src);
    scriptUrl.searchParams.set('form_key', item.form.code);
    scriptUrl.searchParams.set('mode', 'inline');

    return [
        '&lt;link rel="stylesheet" href="' + escapeHtml(item.embed.script_src.replace(/embed\\.js(?:\\?.*)?$/, 'embed.css')) + '"&gt;',
        '&lt;div class="inquiry-embed" data-site-key="' + escapeHtml(item.embed.site_key) + '" data-form-key="' + escapeHtml(item.form.code) + '" data-mode="inline"&gt;&lt;/div&gt;',
        '&lt;script src="' + escapeHtml(scriptUrl.toString()) + '" defer&gt;&lt;/script&gt;'
    ].join('\n');
}

function buildFloatingExample(item) {
    const scriptUrl = new URL(item.embed.script_src);
    scriptUrl.searchParams.set('form_key', item.form.code);
    scriptUrl.searchParams.set('mode', 'floating');

    return [
        '&lt;link rel="stylesheet" href="' + escapeHtml(item.embed.script_src.replace(/embed\\.js(?:\\?.*)?$/, 'embed.css')) + '"&gt;',
        '&lt;script src="' + escapeHtml(scriptUrl.toString()) + '" defer&gt;&lt;/script&gt;'
    ].join('\n');
}

function renderEmbedCards(items) {
    const target = document.getElementById('embed-list');
    if (!Array.isArray(items) || items.length === 0) {
        target.innerHTML = '<p class="muted">暂无可用站点与表单组合。</p>';
        return;
    }

    target.innerHTML = items.map(function (item) {
        return `
            <div class="card" style="margin-top:0;">
                <h3>${escapeHtml(item.site.name)} / ${escapeHtml(item.form.name)}</h3>
                <p class="muted">Site key: <code>${escapeHtml(item.embed.site_key)}</code><br>Form key: <code>${escapeHtml(item.form.code)}</code></p>
                <div style="display:grid; gap:16px;">
                    <div>
                        <strong>Inline example</strong>
                        <pre>${buildInlineExample(item)}</pre>
                    </div>
                    <div>
                        <strong>Floating example</strong>
                        <pre>${buildFloatingExample(item)}</pre>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

async function loadEmbedData() {
    const formData = new FormData();
    formData.append('_csrf_token', embedPageConfig.csrfToken);
    const response = await fetch(embedPageConfig.listEndpoint, { method: 'POST', body: formData });
    const data = await response.json();
    document.getElementById('module-json').textContent = JSON.stringify(data, null, 2);
    if (data.code === 0) {
        renderEmbedCards(data.data.items || []);
    }
}

loadEmbedData();
</script>

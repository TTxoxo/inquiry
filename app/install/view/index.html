<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inquiry Installer</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; color: #1f2937; margin: 0; }
        .wrap { max-width: 860px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 12px 32px rgba(15, 23, 42, .08); padding: 32px; }
        h1 { margin-top: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        button { border: 0; background: #2563eb; color: #fff; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
        button.secondary { background: #4b5563; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        pre { background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 10px; overflow: auto; min-height: 180px; }
        .meta { margin-bottom: 16px; padding: 12px; border-radius: 8px; background: #eff6ff; }
        .locked { background: #fef2f2; color: #991b1b; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Inquiry Installer</h1>
    <div class="meta <?= $viewData['locked'] ? 'locked' : '' ?>">
        <strong>Status:</strong>
        <?= $viewData['locked'] ? 'Installed (POST endpoints are locked).' : 'Ready to install.' ?>
        <br>
        <strong>Lock file:</strong> <?= htmlspecialchars((string) $viewData['lock_file'], ENT_QUOTES, 'UTF-8') ?>
    </div>

    <div class="grid">
        <div>
            <label for="db_host">DB Host</label>
            <input id="db_host" value="127.0.0.1">
        </div>
        <div>
            <label for="db_port">DB Port</label>
            <input id="db_port" value="3306">
        </div>
        <div>
            <label for="db_name">DB Name</label>
            <input id="db_name" value="inquiry">
        </div>
        <div>
            <label for="db_user">DB User</label>
            <input id="db_user" value="root">
        </div>
        <div>
            <label for="db_password">DB Password</label>
            <input id="db_password" type="password" value="">
        </div>
        <div>
            <label for="db_prefix">DB Prefix</label>
            <input id="db_prefix" value="">
        </div>
        <div>
            <label for="admin_username">Admin Username</label>
            <input id="admin_username" value="admin">
        </div>
        <div>
            <label for="admin_password">Admin Password</label>
            <input id="admin_password" type="password" value="admin12345">
        </div>
        <div>
            <label for="admin_email">Admin Email</label>
            <input id="admin_email" value="admin@example.com">
        </div>
    </div>

    <div class="actions">
        <button data-action="check-env">Check Environment</button>
        <button class="secondary" data-action="test-db">Test Database</button>
        <button data-action="execute">Execute Install</button>
    </div>

    <pre id="output">Installer loaded.</pre>
</div>
<script>
const output = document.getElementById('output');
const fields = ['db_host', 'db_port', 'db_name', 'db_user', 'db_password', 'db_prefix', 'admin_username', 'admin_password', 'admin_email'];

function payload() {
    return fields.reduce((result, key) => {
        result[key] = document.getElementById(key).value;
        return result;
    }, {});
}

async function callInstall(action) {
    const endpoint = {
        'check-env': '/install/check-env',
        'test-db': '/install/test-db',
        'execute': '/install/execute'
    }[action];

    const response = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload())
    });
    const data = await response.json();
    output.textContent = JSON.stringify(data, null, 2);
}

document.querySelectorAll('[data-action]').forEach((button) => {
    button.addEventListener('click', () => callInstall(button.dataset.action));
});
</script>
</body>
</html>

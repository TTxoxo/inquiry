<VirtualHost *:80>
    ServerName inquiry.example.com
    DocumentRoot /data/www/enterprise-inquiry-system/public

    <Directory /data/www/enterprise-inquiry-system/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/inquiry-error.log
    CustomLog ${APACHE_LOG_DIR}/inquiry-access.log combined
</VirtualHost>
